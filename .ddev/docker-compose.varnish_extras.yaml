#ddev-generated
#ddev-silent-no-warn
# This configuration modifies HTTP_EXPOSE and HTTPS_EXPOSE for web container
# to exclude port 80, which is handled by Varnish.
# Varnish also handles novarnish.* hostnames with cache bypass via VCL pass.
services:
  web:
    environment:
      - VIRTUAL_HOST=${DDEV_HOSTNAME}
      - HTTP_EXPOSE=8025:8025
      - HTTPS_EXPOSE=8026:8025
  varnish:
    environment:
      - VIRTUAL_HOST=${DDEV_HOSTNAME},novarnish.${DDEV_PROJECT}.${DDEV_TLD}
