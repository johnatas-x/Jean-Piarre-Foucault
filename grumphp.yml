parameters:
  git_dir: .
  bin_dir: vendor/bin
grumphp:
  hooks_dir: null
  hooks_preset: local
  git_hook_variables:
    VAGRANT_HOST_DIR: .
    VAGRANT_PROJECT_DIR: /var/www
    EXEC_GRUMPHP_COMMAND: ddev exec php
    ENV: { }
  stop_on_failure: false
  ignore_unstaged_changes: false
  hide_circumvention_tip: true
  process_timeout: 360 # High value for PHPUnit.
  additional_info: null
  ascii:
    failed: vendor/johnatas-x/angry-bearded/resources/grumpy.txt
    succeeded: .ddev/files/fdj_ascii.txt
  parallel:
    enabled: true
    max_workers: 32
  fixer:
    enabled: true
    fix_by_default: false
  environment:
    files: [ ]
    variables: { }
    paths: [ ]
  extensions:
    - GrumphpPhpa\ExtensionLoader
  testsuites: []
  tasks:
    composer:
      file: ./composer.json
      no_check_all: false
      no_check_lock: false
      no_check_publish: false
      no_local_repository: false
      with_dependencies: false
      strict: false
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    composer_normalize:
      indent_size: ~
      indent_style: ~
      no_check_lock: false
      no_update_lock: true
      verbose: false
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    jsonlint:
      ignore_patterns: []
      detect_key_conflicts: false
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpa:
      path: web
      exclude:
        - web/core
        - web/modules/contrib
        - web/modules/custom/jpf_algo/tests
        - web/modules/custom/jpf_charts/tests
        - web/modules/custom/jpf_home/tests
        - web/modules/custom/jpf_import/tests
        - web/modules/custom/jpf_sender/tests
        - web/modules/custom/jpf_stats/tests
        - web/modules/custom/jpf_store/tests
        - web/modules/custom/jpf_tokens/tests
        - web/modules/custom/jpf_utils/tests
        - web/modules/custom/jpf_views/tests
        - web/sites
        - web/themes/contrib
        - web/.ht.router.php
      metadata:
        blocking: false
        enabled: true
        label: null
        priority: 0
        task: null
    phpcpd:
      directory:
        - web/modules/custom
      exclude:
        - "web/modules/custom/*/src/Form"
        - "web/modules/custom/*/src/Plugin"
        - "web/modules/custom/*/src/Entity"
        - "web/modules/custom/*/tests"
      fuzzy: false
      min_lines: 5
      min_tokens: 70
      triggered_by:
        - inc
        - install
        - module
        - php
        - profile
        - theme
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpcs:
      standard:
        - phpcs.xml
        - vendor/drupal/coder/coder_sniffer/Drupal
        - vendor/drupal/coder/coder_sniffer/DrupalPractice
      severity: ~
      error_severity: ~
      warning_severity: ~
      tab_width: ~
      report: full,summary
      report_width: ~
      whitelist_patterns:
        - web/modules/custom
      encoding: ~
      ignore_patterns:
        - '#^web/modules/custom/[^/]+/tests(/|$)#'
      sniffs: [ ]
      triggered_by:
        - inc
        - info
        - install
        - module
        - php
        - profile
        - test
        - theme
        - yml
      exclude: [ ]
      show_sniffs_error_path: true
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
      parallel: null
    phplint:
      exclude: [ ]
      jobs: ~
      short_open_tag: false
      ignore_patterns:
        - "#tests/(.*)#"
        - "#vendor/(.*)#"
      triggered_by:
        - inc
        - install
        - module
        - php
        - profile
        - theme
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpmd:
      whitelist_patterns:
        - /^web\/modules\/custom\/(.*)/
      exclude:
        - web/modules/custom/jpf_home/src/Services/HomepageHelper.php
      report_format: text
      ruleset:
        - phpmd.xml
      triggered_by:
        - inc
        - install
        - module
        - php
        - profile
        - theme
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpmnd:
      directory: web
      whitelist_patterns: [ ]
      exclude:
        - core
        - modules/contrib
        - sites
        - themes/contrib
      exclude_name: [ ]
      exclude_path:
        - "#tests/(.*)#"
      extensions: [ ]
      hint: false
      ignore_funcs: [ ]
      ignore_numbers: [ ]
      ignore_strings: [ ]
      strings: false
      triggered_by:
        - inc
        - info
        - install
        - module
        - php
        - profile
        - test
        - theme
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpstan:
      autoload_file: ~
      configuration: ~
      level: null
      force_patterns: [ ]
      ignore_patterns:
        - web/.ht.router.php
        - web/sites/default/settings.php
      triggered_by:
        - engine
        - inc
        - install
        - module
        - php
        - profile
        - theme
      memory_limit: "-1"
      use_grumphp_paths: false
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    phpunit:
      config_file: ~
      testsuite: 'unit,kernel,build'
      group: ['Custom']
      exclude_group: [ ]
      always_execute: false
      order: null
      coverage-clover: null
      coverage-html: null
      coverage-php: null
      coverage-xml: null
      metadata:
        blocking: true
        enabled: false
        label: null
        priority: 0
        task: null
    phpversion:
      project: '8.4'
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    securitychecker_composeraudit:
      abandoned: null
      format: null
      locked: true
      no_dev: true
      run_always: true
      working_dir: null
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    twigcs:
      path: 'web'
      severity: 'warning'
      display: 'all'
      ruleset: 'FriendsOfTwig\Twigcs\Ruleset\Official'
      triggered_by: [ 'twig' ]
      exclude:
        - core
        - modules/contrib
        - themes/contrib
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    twigcsfixer:
      paths:
        - web/modules/custom
      level: 'warning'
      config: ~
      report: 'text'
      no-cache: false
      verbose: false
      triggered_by: [ 'twig' ]
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    xmllint:
      ignore_patterns: [ ]
      load_from_net: false
      x_include: false
      dtd_validation: false
      scheme_validation: false
      triggered_by: [ 'xml' ]
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
    yamllint:
      whitelist_patterns:
        - /^config\/(.*)/
        - /^web\/modules\/custom\/(.*)/
      ignore_patterns: [ ]
      object_support: false
      exception_on_invalid_type: false
      parse_constant: false
      parse_custom_tags: false
      metadata:
        blocking: true
        enabled: true
        label: null
        priority: 0
        task: null
